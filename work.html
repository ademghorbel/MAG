<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Design Work — Mohamed Adam Ghorbel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body data-page="work" data-barba-namespace="work">
  <div class="cursor-glow"></div>
  <nav></nav>

  <div class="page-hero">
    <div class="container">
      <div class="eyebrow">Work</div>
      <h1>Design<br><em style="font-style:normal;color:var(--blue)">Work.</em></h1>
      <p class="sub">Graphic design projects — event identities, brand work, UI/UX, and visual communication.</p>
    </div>
  </div>

  <section class="tab-section" style="padding-top:64px">
    <div class="container">
      <div style="display:flex;justify-content:flex-end;margin-bottom:40px">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab(event,'artworks')">Artworks</button>
          <button class="tab-btn" onclick="switchTab(event,'design')">Design Projects</button>
        </div>
      </div>

      <div id="panel-design" class="tab-panel">
        <div style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden" data-stagger>
          <div id="design-work-list"></div>
        </div>
      </div>

      <div id="panel-artworks" class="tab-panel active">
        <div class="artworks-section">
          <div class="bc-wrapper">
            <button class="bc-nav-btn" id="bc-prev" onclick="bcNav(-1)">&#8249;</button>
            <div id="artworks-bounce"></div>
            <button class="bc-nav-btn" id="bc-next" onclick="bcNav(1)">&#8250;</button>
          </div>
          <p id="bc-counter"></p>
        </div>
      </div>
    </div>
  </section>

  <footer></footer>

  <!-- ═══ ARTWORK MODAL ═══ -->
  <div id="artworkModal" class="artwork-modal" onclick="closeModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <img id="modalImage" src="" alt="Artwork Detail">
      <div class="modal-title" id="modalTitle"></div>
    </div>
  </div>

  <!-- ═══ PROJECT MODAL ═══ -->
  <div id="projectModal" class="artwork-modal" onclick="closeProjectModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="align-items:flex-start; overflow-y:auto; padding:4rem 2rem;">
      <button class="modal-close" onclick="closeProjectModal(event)" style="position:fixed;">✕</button>
      <div style="max-width:800px; width:100%; margin:0 auto;">
        <h2 id="projectModalTitle" style="color:#fff; margin-bottom:8px; font-size:32px;"></h2>
        <p id="projectModalDesc" style="color:var(--muted); margin-bottom:32px;"></p>
        <div id="projectModalImages" style="display:flex; flex-direction:column; gap:24px;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/main.js"></script>
  <style>
    .tab-btn.active {
      background: var(--blue) !important;
      color: var(--bg) !important
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    /* ═══ ARTWORK MODAL STYLING ═══ */
    .artwork-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
    }

    .artwork-modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .artwork-modal.active .modal-backdrop {
      opacity: 1;
    }

    .modal-content {
      position: relative;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 2rem;
    }

    #modalImage {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .artwork-modal.active #modalImage {
      opacity: 1;
      transform: scale(1);
    }

    .modal-title {
      color: #fff;
      font-size: 14px;
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }

    .artwork-modal.active .modal-title {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 10001;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.3s;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      opacity: 1;
    }

    /* ═══ BOUNCE CARDS ═══ */
    .bc-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    #artworks-bounce {
      position: relative;
      width: 540px;
      height: 210px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
    }
    .bc-nav-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      background: var(--surface);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }
    .bc-nav-btn:hover { background: var(--surface-2); border-color: var(--hairline-2); }
    .bc-nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
    #bc-counter {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 36px;
    }
    .bc-card {
      position: absolute;
      width: 180px;
      aspect-ratio: 1 / 1;
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }
    .bc-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    @media (max-width: 700px) {
      #artworks-bounce { width: 320px; height: 150px; }
      .bc-card { width: 100px; border-radius: 14px; }
      .bc-nav-btn { width: 32px; height: 32px; font-size: 18px; }
    }
  </style>
  <script>
    function openModal(event, imageSrc, title) {
      event.stopPropagation();
      const modal = document.getElementById('artworkModal');
      const img = document.getElementById('modalImage');
      const titleEl = document.getElementById('modalTitle');

      img.src = imageSrc;
      titleEl.textContent = title;

      // Trigger animation
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        const modal = document.getElementById('artworkModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function openProjectModal(event, projectId) {
      event.preventDefault();
      const project = MAG_DATA.designWork.find(p => p.id === projectId);
      if (!project) return;

      document.getElementById('projectModalTitle').textContent = project.title;
      document.getElementById('projectModalDesc').textContent = project.description;

      const imagesContainer = document.getElementById('projectModalImages');
      if (project.images && project.images.length > 0) {
        imagesContainer.innerHTML = project.images.map(img => `<img src="${img}" style="width:100%; border-radius:8px; display:block;" alt="${project.title} asset">`).join('');
      } else {
        imagesContainer.innerHTML = `<p style="color:var(--muted)">No assets available for this project.</p>`;
      }

      document.getElementById('projectModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeProjectModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        const modal = document.getElementById('projectModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function mgStep(dir) {
      var total = MAG_DATA.artworks.length;
      _modalIdx = (_modalIdx + dir + total) % total;
      var art = MAG_DATA.artworks[_modalIdx];
      document.getElementById('modalImage').src = art.image;
      document.getElementById('modalTitle').textContent = art.title;
    }

    document.addEventListener('keydown', (e) => {
      const artworkModal = document.getElementById('artworkModal');
      if (artworkModal.classList.contains('active')) {
        if (e.key === 'Escape') { artworkModal.classList.remove('active'); document.body.style.overflow = ''; }
        else if (e.key === 'ArrowLeft')  mgStep(-1);
        else if (e.key === 'ArrowRight') mgStep(1);
        return;
      }
      if (e.key === 'Escape') {
        const projectModal = document.getElementById('projectModal');
        if (projectModal.classList.contains('active')) { projectModal.classList.remove('active'); document.body.style.overflow = ''; }
      }
    });

    var _bounceInit = false;
    var _bcOffset = 0;
    var _BC_PAGE = 5;
    var _modalIdx = 0;
    // transform-index subsets for partial pages (< 5 cards)
    var _bcSubsets = { 1:[2], 2:[1,3], 3:[1,2,3], 4:[0,1,3,4], 5:[0,1,2,3,4] };

    function switchTab(event, tabName) {
      event.preventDefault();
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
      if (tabName === 'artworks' && !_bounceInit) {
        _bounceInit = true;
        setTimeout(initBounce, 60);
      }
    }

    var _bcT = [
      'rotate(8deg) translate(-180px)',
      'rotate(3deg) translate(-90px)',
      'rotate(-2deg)',
      'rotate(-7deg) translate(90px)',
      'rotate(4deg) translate(180px)'
    ];

    function initBounce() {
      _bcOffset = 0;
      _bcRender();
    }

    function _bcRender() {
      var wrap = document.getElementById('artworks-bounce');
      if (!wrap || typeof MAG_DATA === 'undefined') return;
      var arts = MAG_DATA.artworks.slice(_bcOffset, _bcOffset + _BC_PAGE);
      var n = arts.length;
      var tIdx = _bcSubsets[n] || [0,1,2,3,4].slice(0, n);
      wrap.innerHTML = arts.map(function(art, i) {
        var ti = tIdx[i];
        return '<div class="bc-card" data-bc-t="' + ti + '" style="transform:' + _bcT[ti] + '" ' +
          'onmouseenter="bcHover(' + i + ')" onmouseleave="bcReset()">' +
          '<img src="' + art.image + '" alt="' + art.title.replace(/'/g, '&#39;') + '">' +
          '</div>';
      }).join('');
      wrap.querySelectorAll('.bc-card').forEach(function(card, i) {
        card.addEventListener('click', function(e) { _modalIdx = _bcOffset + i; openModal(e, arts[i].image, arts[i].title); });
      });
      gsap.context(function() {
        gsap.fromTo('.bc-card', { scale: 0 }, { scale: 1, stagger: 0.08, ease: 'elastic.out(1, 0.5)', delay: 0.15 });
      }, wrap);
      _bcUpdateNav();
    }

    function _bcUpdateNav() {
      var total = (typeof MAG_DATA !== 'undefined') ? MAG_DATA.artworks.length : 0;
      var prev = document.getElementById('bc-prev');
      var next = document.getElementById('bc-next');
      var counter = document.getElementById('bc-counter');
      if (prev) prev.disabled = (_bcOffset === 0);
      if (next) next.disabled = (_bcOffset + _BC_PAGE >= total);
      if (counter) {
        var end = Math.min(_bcOffset + _BC_PAGE, total);
        counter.textContent = (_bcOffset + 1) + ' – ' + end + ' of ' + total;
      }
    }

    window.bcNav = function(dir) {
      var total = (typeof MAG_DATA !== 'undefined') ? MAG_DATA.artworks.length : 0;
      var newOff = Math.max(0, Math.min(_bcOffset + dir * _BC_PAGE, total - 1));
      if (newOff === _bcOffset) return;
      var wrap = document.getElementById('artworks-bounce');
      var cards = wrap ? Array.from(wrap.querySelectorAll('.bc-card')) : [];
      if (cards.length) {
        gsap.to(cards, { scale: 0, duration: 0.18, ease: 'power2.in', stagger: 0.04, onComplete: function() {
          _bcOffset = newOff;
          _bcRender();
        }});
      } else {
        _bcOffset = newOff;
        _bcRender();
      }
    };

    window.bcHover = function(domIdx) {
      var wrap = document.getElementById('artworks-bounce');
      if (!wrap) return;
      var cards = wrap.querySelectorAll('.bc-card');
      cards.forEach(function(card, i) {
        gsap.killTweensOf(card);
        var ti = parseInt(card.dataset.bcT);
        var base = _bcT[ti] || 'none';
        if (i === domIdx) {
          gsap.to(card, { transform: base.replace(/rotate\([^)]+\)/, 'rotate(0deg)'), duration: 0.4, ease: 'back.out(1.4)', overwrite: 'auto' });
        } else {
          var offX = i < domIdx ? -120 : 120;
          var hasTrans = /translate\(([-\d.]+)px\)/.test(base);
          var pushed = hasTrans
            ? base.replace(/translate\(([-\d.]+)px\)/, function(_, x) { return 'translate(' + (parseFloat(x) + offX) + 'px)'; })
            : (base === 'none' ? 'translate(' + offX + 'px)' : base + ' translate(' + offX + 'px)');
          gsap.to(card, { transform: pushed, duration: 0.4, ease: 'back.out(1.4)', delay: Math.abs(domIdx - i) * 0.05, overwrite: 'auto' });
        }
      });
    };

    window.bcReset = function() {
      var wrap = document.getElementById('artworks-bounce');
      if (!wrap) return;
      wrap.querySelectorAll('.bc-card').forEach(function(card) {
        gsap.killTweensOf(card);
        var ti = parseInt(card.dataset.bcT);
        gsap.to(card, { transform: _bcT[ti] || 'none', duration: 0.4, ease: 'back.out(1.4)', overwrite: 'auto' });
      });
    };

    document.addEventListener('DOMContentLoaded', () => {
      gsap.registerPlugin(ScrollTrigger);
      _bounceInit = true;
      setTimeout(initBounce, 60);
    });
  </script>
</body>

</html>
