<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Design Work — Mohamed Adam Ghorbel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="work" data-barba-namespace="work">
  <div class="cursor-glow"></div>
  <nav></nav>

  <div class="page-hero">
    <div class="container">
      <div class="eyebrow">Work</div>
      <h1>Design<br><em style="font-style:normal;color:var(--blue)">Work.</em></h1>
      <p class="sub">Graphic design projects — event identities, brand work, UI/UX, and visual communication.</p>
    </div>
  </div>

  <section class="tab-section" style="padding-top:64px">
    <div class="container">
      <div style="display:flex;justify-content:flex-end;margin-bottom:40px">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab(event,'design')">Design Projects</button>
          <button class="tab-btn" onclick="switchTab(event,'artworks')">Artworks</button>
        </div>
      </div>

      <div id="panel-design" class="tab-panel active">
        <div style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden" data-stagger>
          <div id="design-work-list"></div>
        </div>
      </div>

      <div id="panel-artworks" class="tab-panel">
        <div class="artworks-section">
          <div class="artworks-grid" id="artworks-grid">
            <!-- Populated dynamically via JS -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer></footer>

  <!-- ═══ ARTWORK MODAL ═══ -->
  <div id="artworkModal" class="artwork-modal" onclick="closeModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <img id="modalImage" src="" alt="Artwork Detail">
      <div class="modal-title" id="modalTitle"></div>
    </div>
  </div>

  <!-- ═══ PROJECT MODAL ═══ -->
  <div id="projectModal" class="artwork-modal" onclick="closeProjectModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="align-items:flex-start; overflow-y:auto; padding:4rem 2rem;">
      <button class="modal-close" onclick="closeProjectModal(event)" style="position:fixed;">✕</button>
      <div style="max-width:800px; width:100%; margin:0 auto;">
        <h2 id="projectModalTitle" style="color:#fff; margin-bottom:8px; font-size:32px;"></h2>
        <p id="projectModalDesc" style="color:var(--muted); margin-bottom:32px;"></p>
        <div id="projectModalImages" style="display:flex; flex-direction:column; gap:24px;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/main.js"></script>
  <style>
    .tab-btn.active {
      background: var(--blue) !important;
      color: var(--bg) !important
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    /* ═══ ARTWORK MODAL STYLING ═══ */
    .artwork-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
    }

    .artwork-modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .artwork-modal.active .modal-backdrop {
      opacity: 1;
    }

    .modal-content {
      position: relative;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 2rem;
    }

    #modalImage {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .artwork-modal.active #modalImage {
      opacity: 1;
      transform: scale(1);
    }

    .modal-title {
      color: #fff;
      font-size: 14px;
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }

    .artwork-modal.active .modal-title {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 10001;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.3s;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      opacity: 1;
    }
  </style>
  <script>
    function openModal(event, imageSrc, title) {
      event.stopPropagation();
      const modal = document.getElementById('artworkModal');
      const img = document.getElementById('modalImage');
      const titleEl = document.getElementById('modalTitle');

      img.src = imageSrc;
      titleEl.textContent = title;

      // Trigger animation
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        const modal = document.getElementById('artworkModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function openProjectModal(event, projectId) {
      event.preventDefault();
      const project = MAG_DATA.designWork.find(p => p.id === projectId);
      if (!project) return;

      document.getElementById('projectModalTitle').textContent = project.title;
      document.getElementById('projectModalDesc').textContent = project.description;

      const imagesContainer = document.getElementById('projectModalImages');
      if (project.images && project.images.length > 0) {
        imagesContainer.innerHTML = project.images.map(img => `<img src="${img}" style="width:100%; border-radius:8px; display:block;" alt="${project.title} asset">`).join('');
      } else {
        imagesContainer.innerHTML = `<p style="color:var(--muted)">No assets available for this project.</p>`;
      }

      document.getElementById('projectModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeProjectModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        const modal = document.getElementById('projectModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    // Close modal with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const artworkModal = document.getElementById('artworkModal');
        if (artworkModal.classList.contains('active')) {
          artworkModal.classList.remove('active');
          document.body.style.overflow = '';
        }
        const projectModal = document.getElementById('projectModal');
        if (projectModal.classList.contains('active')) {
          projectModal.classList.remove('active');
          document.body.style.overflow = '';
        }
      }
    });

    function switchTab(event, tabName) {
      event.preventDefault();

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
      gsap.registerPlugin(ScrollTrigger);

      const artworksGrid = document.getElementById('artworks-grid');
      let currentVisible = 12;
      const CHUNK_SIZE = 12;

      function renderArtworks() {
        if (!artworksGrid || typeof MAG_DATA === 'undefined' || !MAG_DATA.artworks) return;
        
        const toShow = MAG_DATA.artworks.slice(0, currentVisible);
        
        artworksGrid.innerHTML = toShow.map((art, i) => `
          <div class="artwork-item" data-delay="${i}">
            <div class="artwork-thumb">
              <img src="${art.image}" alt="${art.title}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.55s cubic-bezier(0.34,1.10,0.64,1)">
              <div class="artwork-overlay">
                <span class="artwork-overlay-label" style="cursor:pointer" onclick="openModal(event, '${art.image}', '${art.title}')">View details →</span>
              </div>
            </div>
            <div class="artwork-meta">
              <span class="artwork-name">${art.title}</span>
              <span class="artwork-year">${art.year}</span>
            </div>
          </div>
        `).join('');

        // Handle load more button
        const existingBtn = document.getElementById('load-more-btn');
        if (existingBtn) existingBtn.remove();

        if (currentVisible < MAG_DATA.artworks.length) {
          const btnContainer = document.createElement('div');
          btnContainer.id = 'load-more-btn';
          btnContainer.style.gridColumn = '1 / -1';
          btnContainer.style.display = 'flex';
          btnContainer.style.justifyContent = 'center';
          btnContainer.style.marginTop = '32px';
          
          btnContainer.innerHTML = `<button class="btn-outline">Load More Artworks ↓</button>`;
          btnContainer.onclick = () => {
            currentVisible += CHUNK_SIZE;
            renderArtworks();
            // Re-trigger ScrollTrigger refresh for new items
            setTimeout(() => ScrollTrigger.refresh(), 100);
          };
          artworksGrid.appendChild(btnContainer);
        }

        // Animate only the newly added items
        const items = document.querySelectorAll('.artwork-item');
        items.forEach((item, index) => {
          if (!item.dataset.animated) {
            item.dataset.animated = 'true';
            gsap.set(item, { opacity: 0, y: 36 });
            gsap.to(item, {
              opacity: 1, y: 0, duration: 0.65,
              ease: 'cubic-bezier(0.16, 1, 0.3, 1)',
              delay: (index % CHUNK_SIZE) * 0.11,
              scrollTrigger: {
                trigger: item, start: 'top 85%', end: 'top 50%',
                scrub: false, markers: false, once: true
              }
            });
          }
        });
      }

      renderArtworks();
    });
  </script>
</body>

</html>
