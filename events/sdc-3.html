        </div>
        <div class="card-hover"
          style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden;background:#000;position:relative;height:240px"
          onmouseover="this.querySelector('.image-overlay').style.opacity='1'"
          onmouseout="this.querySelector('.image-overlay').style.opacity='0'"><iframe

            style="width:100%;height:100%;border:none" allow="autoplay; fullscreen" allowfullscreen></iframe>
          <div class="image-overlay"

            <span
              style="pointer-events:auto;cursor:pointer;color:#fff;font-size:12px;font-family:var(--font-mono);letter-spacing:0.05em;text-decoration:underline"

  <!-- ═══ IMAGE MODAL ═══ -->
  <div id="imageModal" class="image-modal" onclick="closeModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <video id="modalVideo" src="" controls
        style="max-width:90vw;max-height:85vh;opacity:0;transform:scale(0.9);transition:opacity 0.5s cubic-bezier(0.16,1,0.3,1),transform 0.5s cubic-bezier(0.16,1,0.3,1)"></video>
      <iframe id="modalIframe" src="" style="width:80vw;height:65vh;border:none;display:none;border-radius:var(--radius-lg);box-shadow: 0 25px 50px rgba(0,0,0,0.3);" allow="autoplay; fullscreen" allowfullscreen></iframe>
      <img id="modalImage" src="" alt="Image Detail"
        style="max-width:90vw;max-height:85vh;opacity:0;transform:scale(0.9);transition:opacity 0.5s cubic-bezier(0.16,1,0.3,1),transform 0.5s cubic-bezier(0.16,1,0.3,1)">
      <div class="modal-title" id="modalTitle"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script src="../assets/js/main.js"></script>
  <style>
    /* ═══ IMAGE MODAL STYLING ═══ */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
    }

    .image-modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .image-modal.active .modal-backdrop {
      opacity: 1;
    }

    .modal-content {
      position: relative;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 2rem;
    }

    #modalImage,
    #modalVideo {
      object-fit: contain;
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .image-modal.active #modalImage,
    .image-modal.active #modalVideo {
      opacity: 1;
      transform: scale(1);
    }

    .modal-title {
      color: #fff;
      font-size: 14px;
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }

    .image-modal.active .modal-title {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 10001;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.3s;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      opacity: 1;
    }
  </style>
  <script>
    function openModal(event, src, title) {
      event.stopPropagation();
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('modalImage');
      const vid = document.getElementById('modalVideo');
      const iframe = document.getElementById('modalIframe');
      const titleEl = document.getElementById('modalTitle');

      // Reset
      img.style.display = 'none';
      img.src = '';
      vid.style.display = 'none';
      vid.src = '';
      if (iframe) {
        iframe.style.display = 'none';
        iframe.src = '';
      }

      if (src.includes('drive.google.com')) {
        if (iframe) {
          iframe.src = src;
          iframe.style.display = 'block';
        }
      } else if (src.endsWith('.mp4') || src.endsWith('.webm') || src.endsWith('.mov')) {
        vid.src = src;
        vid.style.display = 'block';
      } else {
        img.src = src;
        img.style.display = 'block';
      }

      titleEl.textContent = title;

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        const modal = document.getElementById('imageModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
        // Stop video playback
        const vid = document.getElementById('modalVideo');
        if (vid && vid.src) vid.pause();
        const iframe = document.getElementById('modalIframe');
        if (iframe) iframe.src = '';
      }
    }

    // Close modal on Escape key
    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeModal({ target: document.getElementById('imageModal'), currentTarget: document.getElementById('imageModal') });
      }
    });
  </script>
  <script src="../assets/js/event-gallery.js"></script>
</body>

</html>
