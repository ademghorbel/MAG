<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Event — Mohamed Adam Ghorbel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* ── IMAGE MODAL ── */
    .image-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999
    }

    .image-modal.active {
      display: flex
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease
    }

    .image-modal.active .modal-backdrop {
      opacity: 1
    }

    .modal-content {
      position: relative;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 2rem
    }

    #modalImage {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)
    }

    .image-modal.active #modalImage {
      opacity: 1;
      transform: scale(1)
    }

    .modal-title {
      color: #fff;
      font-size: 14px;
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s
    }

    .image-modal.active .modal-title {
      opacity: 1;
      transform: translateY(0)
    }

    .modal-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 10001;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.3s;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .modal-close:hover {
      opacity: 1
    }
  </style>
</head>

<body data-page="event-detail" data-barba-namespace="event-detail" data-event="aesh">
  <div class="cursor-glow"></div>
  <nav></nav>

  <div class="page-hero">
    <div class="container">
      <div style="margin-bottom:14px">
        <a href="index.html"
          style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:color 0.2s"
          onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">← All Events</a>
      </div>
      <div class="eyebrow" id="event-eyebrow"></div>
      <h1 id="event-title" style="color:var(--text)"></h1>
      <p class="sub" id="event-subtext"></p>
      <div style="margin-top:28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <span class="event-role-badge" id="event-role-badge"></span>
      </div>
    </div>
  </div>

  <section>
    <div class="container">
      <p class="section-label">Design Work</p>
      <div class="img-grid" style="gap:16px;background:transparent;border:none">
        <div class="card-hover"
          style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden;position:relative"
          onmouseover="this.querySelector('.image-overlay').style.opacity='1'"
          onmouseout="this.querySelector('.image-overlay').style.opacity='0'"><img
            src="../assets/images/events/aesh/CALL FOR AMB TRY.webp" alt="Call for Ambassador"
            style="width:100%;height:100%;object-fit:cover">
          <div class="image-overlay"
            style="position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:flex-start;justify-content:flex-end;pointer-events:none;padding:16px;opacity:0;transition:opacity 0.3s">
            <span
              style="pointer-events:auto;cursor:pointer;color:#fff;font-size:12px;font-family:var(--font-mono);letter-spacing:0.05em;text-decoration:underline"
              onclick="openModal(event, '../assets/images/events/aesh/CALL FOR AMB TRY.webp', 'Call for Ambassador')">View
              in full →</span>
          </div>
        </div>
        <div class="card-hover"
          style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden;position:relative"
          onmouseover="this.querySelector('.image-overlay').style.opacity='1'"
          onmouseout="this.querySelector('.image-overlay').style.opacity='0'"><img
            src="../assets/images/events/aesh/Try sessions template.webp" alt="Session Template"
            style="width:100%;height:100%;object-fit:cover">
          <div class="image-overlay"
            style="position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:flex-start;justify-content:flex-end;pointer-events:none;padding:16px;opacity:0;transition:opacity 0.3s">
            <span
              style="pointer-events:auto;cursor:pointer;color:#fff;font-size:12px;font-family:var(--font-mono);letter-spacing:0.05em;text-decoration:underline"
              onclick="openModal(event, '../assets/images/events/aesh/Try sessions template.webp', 'Session Template')">View
              in full →</span>
          </div>
        </div>
        <div class="card-hover"
          style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden;position:relative"
          onmouseover="this.querySelector('.image-overlay').style.opacity='1'"
          onmouseout="this.querySelector('.image-overlay').style.opacity='0'"><img
            src="../assets/images/events/aesh/website.webp" alt="Website"
            style="width:100%;height:100%;object-fit:cover">
          <div class="image-overlay"
            style="position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:flex-start;justify-content:flex-end;pointer-events:none;padding:16px;opacity:0;transition:opacity 0.3s">
            <span
              style="pointer-events:auto;cursor:pointer;color:#fff;font-size:12px;font-family:var(--font-mono);letter-spacing:0.05em;text-decoration:underline"
              onclick="openModal(event, '../assets/images/events/aesh/website.webp', 'Website')">View in full →</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section style="padding-top:0">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 320px;gap:64px;align-items:start">
        <div>
          <p class="section-label">About the Event</p>
          <div id="event-about"></div>
        </div>
        <div data-reveal>
          <p
            style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px">
            Details</p>
          <div id="event-details-table"
            style="border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden"></div>
          <a href="index.html" class="btn-outline"
            style="margin-top:16px;justify-content:center;width:100%;display:flex">← Back to Events</a>
        </div>
      </div>
    </div>
  </section>

  <footer></footer>

  <div id="imageModal" class="image-modal" onclick="closeModal(event)">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <img id="modalImage" src="" alt="Image Detail">
      <div class="modal-title" id="modalTitle"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function openModal(event, imageSrc, title) {
      event.stopPropagation();
      const modal = document.getElementById('imageModal');
      document.getElementById('modalImage').src = imageSrc;
      document.getElementById('modalTitle').textContent = title;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(event) {
      if (event.target === event.currentTarget || event.target.classList.contains('modal-close')) {
        document.getElementById('imageModal').classList.remove('active');
        document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal({ target: document.getElementById('imageModal'), currentTarget: document.getElementById('imageModal') });
    });
  </script>
</body>

</html>
